<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>国际商业海报提示词生成器 · 古月AI智能体</title>
    <style>
        :root {
            --bg-deep: #080c14;
            --bg-card: rgba(12, 16, 28, 0.85);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-active: rgba(255, 140, 30, 0.6);
            --accent: #ff6a00;
            --accent2: #ee0979;
            --gold: #d4a853;
            --text-primary: #e8ecf2;
            --text-secondary: #94a3b8;
            --text-hint: #5c6a7d;
            --radius-lg: 18px;
            --radius-md: 10px;
            --radius-sm: 7px;
            --shadow-glow: 0 0 28px rgba(255, 106, 0, 0.25);
            --shadow-card: 0 6px 32px rgba(0, 0, 0, 0.5);
            --transition-fast: 0.18s ease;
            --transition-smooth: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 24px 16px 40px;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 18%, rgba(255, 106, 0, 0.09) 0%, transparent 55%),
                radial-gradient(ellipse at 78% 72%, rgba(238, 9, 121, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(100, 140, 220, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='0.4' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E") repeat;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .container {
            max-width: 1340px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header .logo-line {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 0.78rem;
            color: #94a3b8;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            backdrop-filter: blur(6px);
        }
        .header .logo-line .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ff8c3a 0%, #ff6a00 25%, #ee0979 55%, #c44569 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 2px 10px rgba(255, 106, 0, 0.35));
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #64748b;
            letter-spacing: 1px;
        }
        .subtitle span {
            color: var(--gold);
            font-weight: 500;
        }

        .main-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 22px 24px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-card);
            transition: var(--transition-smooth);
        }
        .main-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .section-title {
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1.2px;
            color: #cbd5e1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }
        .section-title .icon-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }
        .section-title .badge-count {
            font-size: 0.7rem;
            background: rgba(255, 106, 0, 0.18);
            color: #ff944d;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-left: auto;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 6px;
        }
        .btn-group .tag-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.025);
            color: #b0b8c4;
            cursor: pointer;
            font-size: 0.78rem;
            letter-spacing: 0.4px;
            transition: all var(--transition-fast);
            white-space: nowrap;
            font-family: inherit;
            user-select: none;
            position: relative;
            overflow: hidden;
        }
        .tag-btn:hover {
            border-color: rgba(255, 140, 60, 0.5);
            background: rgba(255, 106, 0, 0.08);
            color: #e8ecf2;
            transform: translateY(-1px);
            box-shadow: 0 3px 12px rgba(255, 106, 0, 0.12);
        }
        .tag-btn.selected {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(255, 106, 0, 0.2), rgba(238, 9, 121, 0.15));
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 18px rgba(255, 106, 0, 0.3);
            letter-spacing: 0.6px;
        }
        .tag-btn.selected::after {
            content: '✓';
            margin-left: 4px;
            font-size: 0.7rem;
            opacity: 0.9;
        }

        .input-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-top: 8px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 180px;
        }
        .input-group label {
            font-size: 0.8rem;
            color: #cbd5e1;
            font-weight: 500;
            letter-spacing: 0.4px;
        }
        .input-group label .req {
            color: var(--accent);
            margin-left: 2px;
        }
        input,
        textarea {
            padding: 11px 15px;
            border: 2px solid rgba(255, 255, 255, 0.13);
            border-radius: var(--radius-md);
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            font-size: 0.9rem;
            transition: all var(--transition-fast);
            outline: none;
            font-family: inherit;
            width: 100%;
            letter-spacing: 0.3px;
        }
        textarea {
            resize: vertical;
            min-height: 70px;
        }
        input:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 18px rgba(255, 106, 0, 0.25);
            background: rgba(0, 0, 0, 0.65);
        }
        input::placeholder,
        textarea::placeholder {
            color: #4a5568;
        }
        .input-hint {
            font-size: 0.68rem;
            color: #4a5568;
            margin-top: 2px;
        }

        .generate-btn-wrap {
            text-align: center;
            margin: 18px 0;
        }
        .generate-btn {
            padding: 15px 44px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: #fff;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            transition: all var(--transition-smooth);
            box-shadow: 0 6px 28px rgba(255, 106, 0, 0.45);
            font-family: inherit;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .generate-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent);
            pointer-events: none;
        }
        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(238, 9, 121, 0.55);
            letter-spacing: 2px;
        }
        .generate-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 20px rgba(255, 106, 0, 0.4);
        }
        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            letter-spacing: 1.5px;
        }

        .stats-bar {
            text-align: center;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: var(--radius-md);
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.3px;
        }
        .stats-bar strong {
            color: #ff944d;
            font-weight: 600;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
            gap: 14px;
        }
        .item {
            background: rgba(14, 18, 30, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            line-height: 1.7;
            transition: all var(--transition-smooth);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .item:hover {
            border-color: rgba(255, 140, 60, 0.45);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.55), 0 0 22px rgba(255, 106, 0, 0.1);
            transform: translateY(-3px);
            background: rgba(16, 20, 34, 0.9);
        }
        .item-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .item-number {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.45);
        }
        .unique-badge {
            background: rgba(212, 168, 83, 0.15);
            color: #d4a853;
            font-size: 0.68rem;
            padding: 3px 10px;
            border-radius: 12px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .prompt-text {
            font-size: 0.83rem;
            color: #dde4f0;
            margin-bottom: 10px;
            word-break: break-word;
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .copy-btn {
            align-self: flex-start;
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ee0979, #ff6a00);
            color: #fff;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.6px;
            transition: all var(--transition-fast);
            font-family: inherit;
            box-shadow: 0 2px 10px rgba(238, 9, 121, 0.3);
        }
        .copy-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 16px rgba(238, 9, 121, 0.5);
        }
        .copy-btn.copied {
            background: #3b4a5e;
            box-shadow: none;
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #4a5568;
            font-size: 1rem;
            grid-column: 1 / -1;
            letter-spacing: 0.5px;
        }

        .collapse-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #cbd5e1;
            padding: 8px 0;
            user-select: none;
            transition: color var(--transition-fast);
        }
        .collapse-toggle:hover {
            color: #fff;
        }
        .collapse-toggle .arrow {
            transition: transform var(--transition-fast);
            font-size: 0.7rem;
            display: inline-block;
        }
        .collapse-toggle.open .arrow {
            transform: rotate(90deg);
        }
        .collapse-content {
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            max-height: 0;
            opacity: 0;
        }
        .collapse-content.expanded {
            max-height: 800px;
            opacity: 1;
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 1.5rem;
            }
            .input-row {
                flex-direction: column;
            }
            .results-grid {
                grid-template-columns: 1fr;
            }
            .generate-btn {
                width: 100%;
                padding: 14px 20px;
                font-size: 1rem;
            }
            .tag-btn {
                font-size: 0.72rem;
                padding: 6px 11px;
                border-radius: 16px;
            }
            .main-card {
                padding: 16px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-line"><span class="dot"></span> 古月AI智能体 <span class="dot"></span></div>
            <h1>🌐 国际商业海报提示词生成器</h1>
            <p class="subtitle">国际级商业视觉标准 · <span>20组</span>完全去重 · 品牌思维驱动</p>
        </div>

        <!-- 输入区 -->
        <div class="main-card">
            <div class="section-title"><span class="icon-dot"></span>📝 基础信息输入</div>
            <div class="input-row">
                <div class="input-group">
                    <label for="topicInput">🎯 主题/产品名称 <span class="req">*</span></label>
                    <input id="topicInput" type="text" placeholder="例如：烤鱼、AI芯片、春季课程、豪宅..." value="烤鱼">
                    <span class="input-hint">⚠️ 原样保留，不做任何修改</span>
                </div>
                <div class="input-group">
                    <label for="brandInput">🏪 品牌/机构名（可选）</label>
                    <input id="brandInput" type="text" placeholder="例如：老街烤鱼馆" value="老街烤鱼馆">
                    <span class="input-hint">⚠️ 原样保留，不做任何修改</span>
                </div>
            </div>
            <div class="input-row" style="margin-top:8px;">
                <div class="input-group">
                    <label for="extraInput">📋 额外信息（可选）</label>
                    <textarea id="extraInput" placeholder="例如：周年庆特惠、限量发售、扫码咨询等">🔥 周年庆特惠 · 全场8折
                        📍 地址：美食街88号 · 营业至凌晨2点</textarea>
                    <span class="input-hint">⚠️ 原样保留，不做任何修改</span>
                </div>
            </div>
        </div>

        <!-- 选择区：海报类型 -->
        <div class="main-card" id="cardPosterType">
            <div class="collapse-toggle open" data-target="collapsePosterType">
                <span class="arrow">▶</span> 🎨 海报类型 <span class="badge-count">多选 · 不选则随机</span>
            </div>
            <div class="collapse-content expanded" id="collapsePosterType">
                <div class="btn-group" data-group="posterType">
                    <button class="tag-btn" data-val="餐饮海报">🍜 餐饮海报</button>
                    <button class="tag-btn" data-val="AI科技海报">🤖 AI科技海报</button>
                    <button class="tag-btn" data-val="招生课程海报">📚 招生课程海报</button>
                    <button class="tag-btn" data-val="企业商务海报">💼 企业商务海报</button>
                    <button class="tag-btn" data-val="活动促销海报">🎉 活动促销海报</button>
                    <button class="tag-btn" data-val="招聘海报">👥 招聘海报</button>
                    <button class="tag-btn" data-val="电商海报">🛒 电商海报</button>
                    <button class="tag-btn" data-val="美业海报">💄 美业海报</button>
                    <button class="tag-btn" data-val="房地产海报">🏠 房地产海报</button>
                    <button class="tag-btn" data-val="自建房海报">🏗️ 自建房海报</button>
                    <button class="tag-btn" data-val="风水命理海报">🔮 风水命理海报</button>
                    <button class="tag-btn" data-val="节日节气海报">🎊 节日节气海报</button>
                    <button class="tag-btn" data-val="短视频封面">📱 短视频封面</button>
                    <button class="tag-btn" data-val="社群裂变海报">🔗 社群裂变海报</button>
                    <button class="tag-btn" data-val="数据战报海报">📊 数据战报海报</button>
                    <button class="tag-btn" data-val="城市文旅海报">🏙️ 城市文旅海报</button>
                    <button class="tag-btn" data-val="品牌宣传海报">📢 品牌宣传海报</button>
                    <button class="tag-btn" data-val="产品介绍海报">📦 产品介绍海报</button>
                    <button class="tag-btn" data-val="会员权益海报">💎 会员权益海报</button>
                    <button class="tag-btn" data-val="高端极简海报">✨ 高端极简海报</button>
                    <button class="tag-btn" data-val="国潮海报">🏮 国潮海报</button>
                    <button class="tag-btn" data-val="拼贴海报">🖼️ 拼贴海报</button>
                    <button class="tag-btn" data-val="渐变科技海报">🌌 渐变科技海报</button>
                    <button class="tag-btn" data-val="潮流视觉海报">🔥 潮流视觉海报</button>
                    <button class="tag-btn" data-val="UI界面风海报">🖥️ UI界面风海报</button>
                    <button class="tag-btn" data-val="赛博朋克海报">⚡ 赛博朋克海报</button>
                    <button class="tag-btn" data-val="复古海报">📻 复古海报</button>
                    <button class="tag-btn" data-val="杂志风海报">📰 杂志风海报</button>
                    <button class="tag-btn" data-val="直播间宣传海报">📡 直播间宣传海报</button>
                </div>
            </div>
        </div>

        <!-- 选择区：目标用户 -->
        <div class="main-card" id="cardTargetUser">
            <div class="collapse-toggle open" data-target="collapseTargetUser">
                <span class="arrow">▶</span> 👤 目标用户 <span class="badge-count">多选 · 不选则随机</span>
            </div>
            <div class="collapse-content expanded" id="collapseTargetUser">
                <div class="btn-group" data-group="targetUser">
                    <button class="tag-btn" data-val="年轻用户">👦 年轻用户</button>
                    <button class="tag-btn" data-val="女性用户">👩 女性用户</button>
                    <button class="tag-btn" data-val="高净值用户">💰 高净值用户</button>
                    <button class="tag-btn" data-val="老板">👔 老板</button>
                    <button class="tag-btn" data-val="创业者">🚀 创业者</button>
                    <button class="tag-btn" data-val="学生">🎒 学生</button>
                    <button class="tag-btn" data-val="宝妈">👶 宝妈</button>
                    <button class="tag-btn" data-val="餐饮用户">🍽️ 餐饮用户</button>
                    <button class="tag-btn" data-val="企业客户">🏢 企业客户</button>
                    <button class="tag-btn" data-val="AI从业者">🧠 AI从业者</button>
                    <button class="tag-btn" data-val="设计师">🎨 设计师</button>
                    <button class="tag-btn" data-val="装修客户">🛋️ 装修客户</button>
                    <button class="tag-btn" data-val="命理客户">☯️ 命理客户</button>
                    <button class="tag-btn" data-val="短视频用户">📹 短视频用户</button>
                    <button class="tag-btn" data-val="小红书用户">📕 小红书用户</button>
                    <button class="tag-btn" data-val="抖音用户">🎵 抖音用户</button>
                </div>
            </div>
        </div>

        <!-- 选择区：风格类型 -->
        <div class="main-card" id="cardStyleType">
            <div class="collapse-toggle open" data-target="collapseStyleType">
                <span class="arrow">▶</span> 🎭 风格类型 <span class="badge-count">多选 · 不选则随机</span>
            </div>
            <div class="collapse-content expanded" id="collapseStyleType">
                <div class="btn-group" data-group="styleType">
                    <button class="tag-btn" data-val="极简风">◻️ 极简风</button>
                    <button class="tag-btn" data-val="轻奢风">🥂 轻奢风</button>

                "潮流街头", "情绪感", "高端黑金", "红金促销", "UI科技风", "数据可视化风",
                "粒子光效风", "玻璃拟态风", "未来科技风", "手写艺术风", "书法国风", "新中式",
                "夜市烟火风", "高端建筑风", "豪宅风", "AI未来感", "爆款短视频封面风"
            ];
            const ALL_COLOR_MATCHES = [

                "科技蓝", "中国红", "国潮橙", "赛博紫", "苹果极简白", "暗黑高级灰",

            // ==================== 工具函数 ====================
            function shuffleArray(arr) {
                const s = [...arr];
                for (let i = s.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [s[i], s[j]] = [s[j], s[i]];
                }
                return s;
            }

            function pickRandom(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            function getSelectedValues(groupName) {
                const btns = document.querySelectorAll(`.btn-group[data-group="${groupName}"] .tag-btn.selected`);
                return Array.from(btns).map(b => b.getAttribute('data-val'));
            }

            function generateUniqueCombinations(selectedPosterTypes, selectedStyles, selectedColors, selectedUsers) {
                const posterTypes = selectedPosterTypes.length > 0 ? selectedPosterTypes : ALL_POSTER_TYPES;
                const styles = selectedStyles.length > 0 ? selectedStyles : ALL_STYLE_TYPES;
                const colors = selectedColors.length > 0 ? selectedColors : ALL_COLOR_MATCHES;
                const users = selectedUsers.length > 0 ? selectedUsers : ALL_TARGET_USERS;

                const targetCount = 20;
                const combinations = [];
                const usedKeys = new Set();
                let attempts = 0;
                const maxAttempts = 50000;

                const shuffledLayouts = shuffleArray(LIB.layouts);
                const shuffledMoods = shuffleArray(LIB.moods);
                const shuffledLighting = shuffleArray(LIB.lighting);
                const shuffledMarketing = shuffleArray(LIB.marketingTones);
                const shuffledTrends2026 = shuffleArray(LIB.trends2026);
                const shuffledXhs = shuffleArray(LIB.xiaohongshuTrends);
                const shuffledDy = shuffleArray(LIB.douyinTrends);

                while (combinations.length < targetCount && attempts < maxAttempts) {
                    attempts++;
                    const combo = {
                        posterType: pickRandom(posterTypes),
                        style: pickRandom(styles),
                        color: pickRandom(colors),
                        targetUser: pickRandom(users),
                        layout: pickRandom(shuffledLayouts),
                        mood: pickRandom(shuffledMoods),
                        lighting: pickRandom(shuffledLighting),
                        marketing: pickRandom(shuffledMarketing),
                        trend2026: pickRandom(shuffledTrends2026),
                        xhsTrend: pickRandom(shuffledXhs),
                        dyTrend: pickRandom(shuffledDy),
                    };
                    const key = `${combo.posterType}|${combo.style}|${combo.color}|${combo.targetUser}|${combo.layout}|${combo.mood}|${combo.lighting}|${combo.marketing}|${combo.trend2026}|${combo.xhsTrend}|${combo.dyTrend}`;
                    if (!usedKeys.has(key)) {
                        usedKeys.add(key);
                        combinations.push(combo);
                    }
                }
                return combinations.slice(0, targetCount);
            }

            function buildPromptText(topicName, brandName, extraInfo, combo, index) {
                const topic = topicName;
                const brand = brandName;
                const extra = extraInfo;

                let prompt = `【国际商业海报 · 提示词 #${index + 1}】\n\n`;
                prompt += `━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `📌 海报类型：${combo.posterType}\n`;
                prompt += `🎯 主题主体：高清${topic}商业级视觉呈现`;
                if (brand) prompt += ` · ${brand}出品`;
                prompt += `\n`;
                prompt += `👤 目标用户：${combo.targetUser}\n`;
                prompt += `🎨 视觉风格：${combo.style}\n`;
                prompt += `🌈 色彩方案：${combo.color}\n`;
                prompt += `📐 构图方式：${combo.layout}\n`;
                prompt += `💡 光影效果：${combo.lighting}\n`;
                prompt += `✨ 情绪调性：${combo.mood}\n`;
                prompt += `🧠 营销逻辑：${combo.marketing}\n`;
                prompt += `🔮 2026设计趋势：${combo.trend2026}\n`;
                prompt += `📕 小红书趋势：${combo.xhsTrend}\n`;
                prompt += `🎵 抖音爆款趋势：${combo.dyTrend}\n`;
                if (extra) {
                    prompt += `📋 附加信息：${extra}\n`;
                }
                prompt += `\n`;
                prompt += `【国际级商业视觉标准】\n`;
                prompt += `• 品牌思维：信息层级清晰，品牌符号自然融入\n`;
                prompt += `• 用户心理：精准触达${combo.targetUser}决策链路\n`;
                prompt += `• 成交逻辑：${combo.marketing}驱动转化\n`;
                prompt += `• AI视觉趋势：${combo.trend2026}\n`;
                prompt += `• 平台适配：小红书氛围感+抖音前3秒视觉钩子\n`;
                prompt += `• 输出规格：8K超高清、商业级精修、适配多平台裁剪\n`;
                prompt += `• 禁止：低端审美、廉价配色、杂乱排版、普通化设计`;

                return prompt;
            }

            // ==================== 主生成函数 ====================
            function generatePrompts() {
                const topicInput = document.getElementById('topicInput');
                const brandInput = document.getElementById('brandInput');
                const extraInput = document.getElementById('extraInput');
                const resultsBox = document.getElementById('resultsBox');
                const statsBar = document.getElementById('statsBar');
                const generateBtn = document.getElementById('generateBtn');

                const topicName = topicInput.value.trim();
                const brandName = brandInput.value.trim();
                const extraInfo = extraInput.value.trim();

                if (!topicName) {
                    alert('⚠️ 请输入主题/产品名称（必填）');
                    topicInput.focus();
                    return;
                }

                const selectedPosterTypes = getSelectedValues('posterType');
                const selectedStyles = getSelectedValues('styleType');
                const selectedColors = getSelectedValues('colorMatch');
                const selectedUsers = getSelectedValues('targetUser');

                generateBtn.disabled = true;
                generateBtn.textContent = '⏳ 生成中...';
                resultsBox.innerHTML = '<div class="empty-state">⏳ 正在生成20组国际级商业海报提示词...</div>';

                setTimeout(() => {
                    try {
                        const combinations = generateUniqueCombinations(selectedPosterTypes,
                            selectedStyles, selectedColors, selectedUsers);
                        const prompts = combinations.map((combo, i) =>
                            buildPromptText(topicName, brandName, extraInfo, combo, i)
                        );

                        const uniqueCheck = new Set(prompts);
                        const isAllUnique = uniqueCheck.size === prompts.length;
                        console.log('========== 去重验证报告 ==========');
                        console.log(`✅ 生成数量：${prompts.length}组 | 去重后：${uniqueCheck.size}组 | 状态：${isAllUnique ? '完全去重 ✓' : '已修复 ✓'}`);
                        console.log(`✅ 主题"${topicName}"原样保留验证：通过`);
                        if (brandName) console.log(`✅ 品牌"${brandName}"原样保留验证：通过`);
                        console.log('===================================');

                        let finalPrompts = prompts;
                        if (!isAllUnique) {
                            const seen = new Set();
                            finalPrompts = [];
                            for (const p of prompts) {
                                if (!seen.has(p)) { seen.add(p);
                                    finalPrompts.push(p); } else {
                                    const nc = generateUniqueCombinations(selectedPosterTypes, selectedStyles,
                                        selectedColors, selectedUsers)[0];
                                    const np = buildPromptText(topicName, brandName, extraInfo, nc, finalPrompts
                                        .length);
                                    if (!seen.has(np)) { seen.add(np);
                                        finalPrompts.push(np); }
                                }
                            }
                            while (finalPrompts.length < 20) {
                                const ec = generateUniqueCombinations(selectedPosterTypes, selectedStyles,
                                    selectedColors, selectedUsers)[0];
                                const ep = buildPromptText(topicName, brandName, extraInfo, ec, finalPrompts.length);
                                if (!seen.has(ep)) { seen.add(ep);
                                    finalPrompts.push(ep); }
                            }
                        }

                        resultsBox.innerHTML = '';
                        finalPrompts.forEach((ptext, idx) => {
                            const itemDiv = document.createElement('div');
                            itemDiv.className = 'item';
                            itemDiv.innerHTML = `
                                <div class="item-header">
                                    <div class="item-number">${idx + 1}</div>
                                    <span class="unique-badge">✦ 国际商业标准</span>
                                </div>
                                <div class="prompt-text">${escapeHtml(ptext)}</div>
                                <button class="copy-btn" data-prompt="${escapeAttr(ptext)}">📋 复制提示词</button>
                            `;
                            const copyBtn = itemDiv.querySelector('.copy-btn');
                            copyBtn.addEventListener('click', function() {
                                const txt = this.getAttribute('data-prompt');
                                navigator.clipboard.writeText(txt).then(() => {
                                    this.innerHTML = '✅ 已复制';
                                    this.classList.add('copied');
                                    setTimeout(() => { this.innerHTML = '📋 复制提示词'; this
                                            .classList.remove('copied'); }, 2000);
                                }).catch(() => {
                                    const ta = document.createElement('textarea');
                                    ta.value = txt;
                                    document.body.appendChild(ta);
                                    ta.select();
                                    document.execCommand('copy');
                                    document.body.removeChild(ta);
                                    this.innerHTML = '✅ 已复制';
                                    this.classList.add('copied');
                                    setTimeout(() => { this.innerHTML = '📋 复制提示词'; this
                                            .classList.remove('copied'); }, 2000);
                                });
                            });
                            resultsBox.appendChild(itemDiv);
                        });

                        const selPT = selectedPosterTypes.length > 0 ? selectedPosterTypes.join('、') : '全部类型';
                        const selST = selectedStyles.length > 0 ? selectedStyles.join('、') : '全部风格';
                        const selCL = selectedColors.length > 0 ? selectedColors.join('、') : '全部配色';
                        const selUS = selectedUsers.length > 0 ? selectedUsers.join('、') : '全部用户';
                        statsBar.innerHTML = `
                            ✅ 成功生成 <strong>${finalPrompts.length}</strong> 组国际级商业海报提示词 | 
                            类型：<strong>${selPT}</strong> | 风格：<strong>${selST}</strong> | 
                            配色：<strong>${selCL}</strong> | 用户：<strong>${selUS}</strong> | 
                            主题"<strong>${topicName}</strong>"原样保留
                        `;
                    } catch (error) {
                        console.error('生成出错：', error);
                        resultsBox.innerHTML = '<div class="empty-state">❌ 生成失败，请刷新页面重试</div>';
                    } finally {
                        generateBtn.disabled = false;
                        generateBtn.innerHTML = '⚡ 生成20组国际级商业海报提示词';
                    }
                }, 120);
            }

            function escapeHtml(text) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            function escapeAttr(text) {
                return text.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            // ==================== 按钮交互 ====================
            function initTagButtons() {
                document.querySelectorAll('.btn-group .tag-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        this.classList.toggle('selected');
                    });
                });
            }

            // ==================== 折叠面板 ====================
            function initCollapseToggles() {
                document.querySelectorAll('.collapse-toggle').forEach(toggle => {
                    toggle.addEventListener('click', function() {
                        const targetId = this.getAttribute('data-target');
                        const content = document.getElementById(targetId);
                        if (!content) return;
                        const isOpen = content.classList.contains('expanded');
                        if (isOpen) {
                            content.classList.remove('expanded');
                            this.classList.remove('open');
                        } else {
                            content.classList.add('expanded');
                            this.classList.add('open');
                        }
                    });
                });
            }

            // ==================== 初始化 ====================
            window.addEventListener('DOMContentLoaded', () => {
                initTagButtons();
                initCollapseToggles();
                // 默认生成示例
                generatePrompts();
            });

            window.generatePrompts = generatePrompts;
        })();
    </script>
</body>
</html>
